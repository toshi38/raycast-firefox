name: Release

on:
  push:
    branches: [main]

# Prevent duplicate release runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Build & Lint
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native host bundle
        run: npm run build --workspace=native-host

      - name: Verify native host bundle
        run: test -f native-host/dist/host.bundle.js

      - name: Lint Firefox extension
        run: npm run lint --workspace=extension

      # TODO: Enable when ray CLI availability on CI is confirmed
      - name: Lint Raycast extension
        if: false
        run: npm run lint --workspace=raycast-extension

      # TODO: Enable when ray CLI availability on CI is confirmed
      - name: Build Raycast extension
        if: false
        run: npm run build --workspace=raycast-extension

  release:
    name: Release
    needs: [ci]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build native host bundle
        run: npm run build --workspace=native-host

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect release condition
        id: detect-release
        run: |
          # Primary: trust changesets published output
          PUBLISHED="${{ steps.changesets.outputs.published }}"
          if [ "$PUBLISHED" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release detected via changesets published output"
          else
            # Fallback: check if changesets just created a native-host tag on HEAD
            NH_TAG=$(git tag --points-at HEAD | grep '^native-host@' || true)
            if [ -n "$NH_TAG" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Release detected via fallback tag detection: $NH_TAG"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "No release detected"
            fi
          fi

      - name: Generate SHA256 checksums
        if: steps.detect-release.outputs.should_release == 'true'
        run: |
          cd native-host/dist
          shasum -a 256 host.bundle.js run.sh > SHA256SUMS.txt
          # Round-trip verify checksums match
          shasum -a 256 -c SHA256SUMS.txt

      - name: Get native-host version
        id: nh-version
        if: steps.detect-release.outputs.should_release == 'true'
        run: |
          VERSION=$(node -p "require('./native-host/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=native-host@$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.detect-release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.nh-version.outputs.tag }}
          name: native-host@${{ steps.nh-version.outputs.version }}
          generate_release_notes: false
          files: |
            native-host/dist/host.bundle.js
            native-host/dist/run.sh
            native-host/dist/SHA256SUMS.txt

      - name: Verify GitHub Release was created
        if: steps.detect-release.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.nh-version.outputs.tag }}"
          # Verify the release exists via gh CLI
          gh release view "$TAG" --json tagName,assets --jq '.assets[].name' | sort
          echo "Release $TAG verified with assets above"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
